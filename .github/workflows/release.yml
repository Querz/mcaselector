name: Release

on:
  workflow_dispatch:
    branches: [master]
  release:
    branches: [master]
    types: [published]

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: gradlew build shadowJar --stacktrace --warning-mode all
        shell: cmd

      - name: Download WinRun4J
        uses: suisei-cn/actions-download-file@v1.6.0
        with:
          url: https://github.com/poidasmith/winrun4j/files/1822558/winrun4J-0.4.5.zip
          target: .

      - name: Download ResourceHacker
        uses: suisei-cn/actions-download-file@v1.6.0
        with:
          url: http://www.angusj.com/resourcehacker/resource_hacker.zip
          target: .

      - name: Initialize resources for installer
        run: ./installer/init .
        shell: bash

      - name: Build exe
        run: |
          7z x winrun4J-0.4.5.zip -owr4j
          7z x resource_hacker.zip -orh
          rh\ResourceHacker.exe -open wr4j\winrun4j\bin\WinRun4J64.exe -save "MCA Selector.exe" -action delete -mask ,,
          wr4j\winrun4j\bin\RCEDIT64.exe /I "MCA Selector.exe" installer\img\icon.ico
          wr4j\winrun4j\bin\RCEDIT64.exe /N "MCA Selector.exe" installer\res\winrun4j.ini
          rh\ResourceHacker.exe -open installer\res\resource.rc -save resource.res -action compile
          rh\ResourceHacker.exe -open "MCA Selector.exe" -save "MCA Selector.exe" -action add -resource resource.res
          move "MCA Selector.exe" build\inno
        shell: cmd

      - name: Download 7za
        uses: suisei-cn/actions-download-file@v1.6.0
        with:
          url: https://www.7-zip.org/a/7za920.zip
          target: .

      - name: Build installer
        run: |
          7z x 7za920.zip -o7z
          move 7z\7za.exe build\inno
          "%programfiles(x86)%/Inno Setup 6/iscc.exe" build/inno/inno.iss /q
        shell: cmd

      - name: Find signtool
        uses: KamaranL/add-signtool-action@v1
        id: signtool

      - name: Sign installer
        run: |
          xcopy build\inno\Output\MCA_Selector_Setup.exe build\inno\Output\Signed\
          $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_DATA }}")
          [IO.File]::WriteAllBytes("build/inno/Output/code_signing.pfx", $bytes)
          signtool sign `
            /f "build/inno/Output/code_signing.pfx" `
            /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" `
            /fd SHA256 /t "http://timestamp.digicert.com" `
            "build/inno/Output/Signed/MCA_Selector_Setup.exe"
        shell: powershell

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: Windows-Artifact
          path: |
            build/inno/Output/MCA_Selector_Setup.exe
            build/inno/Output/Signed/MCA_Selector_Setup.exe
            build/libs/mcaselector-2.6.1.jar

      - name: Upload assets
        uses: AButler/upload-release-assets@v3.0
        with:
          files: build/inno/Output/Signed/MCA_Selector_Setup.exe;build/libs/mcaselector-2.6.1.jar
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Wiki
        uses: actions/checkout@v4.1.3
        with:
          repository: Querz/mcaselector-wiki
          path: mcaselector-wiki

      - name: Update Wiki
        run: |
          cd mcaselector-wiki
          echo -n 2.6.1 > version.txt
          ./update_version
        shell: bash

      - name: Push Wiki
        continue-on-error: true
        run: |
          cd mcaselector-wiki
          git config --global user.name 'Querz'
          git config --global user.email 'wiki@querz.net'
          git config --unset-all http.https://github.com/.extraheader
          git remote set-url origin https://x-access-token:${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}@github.com/Querz/mcaselector-wiki
          git commit -am "Automated version update to 2.6.1"
          git push
        shell: bash

  publish-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Set up JDK 21
        uses: actions/setup-java@v4.2.1
        with:
          distribution: temurin
          java-version: 21

      - name: Build jar
        run: ./gradlew build shadowJar --stacktrace --warning-mode all

      - name: Initialize macOS resources
        run: ./installer/init-macos .

      - name: Create macOS app bundle and DMG
        run: |
          # Read version from gradle.properties
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          JAVAFX_JMODS="build/macos/javafx-jmods"

          # Create custom runtime with jlink (properly includes JavaFX native libraries)
          echo "Creating custom runtime with jlink..."
          jlink \
            --module-path "$JAVA_HOME/jmods:$JAVAFX_JMODS" \
            --add-modules java.base,java.desktop,java.logging,java.management,java.naming,java.sql,java.scripting,java.xml,jdk.unsupported,javafx.controls,javafx.swing,javafx.graphics,javafx.base \
            --output build/macos/runtime \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress zip-6

          # Create the app using jpackage with custom runtime
          echo "Creating DMG with jpackage..."
          jpackage \
            --type dmg \
            --name "MCA Selector" \
            --app-version "$VERSION" \
            --vendor "Querz" \
            --copyright "$(grep 'application.copyright=' gradle.properties | cut -d'=' -f2)" \
            --description "A tool to select chunks from Minecraft worlds for deletion or export" \
            --icon build/macos/icon.icns \
            --input build/macos \
            --main-jar mcaselector.jar \
            --main-class net.querz.mcaselector.Main \
            --dest build/macos/output \
            --runtime-image build/macos/runtime \
            --java-options "-Xmx4G" \
            --license-file build/macos/LICENSE \
            --mac-package-identifier net.querz.mcaselector \
            --mac-package-name "MCA Selector"

          # Rename output to consistent name
          mv "build/macos/output/MCA Selector-$VERSION.dmg" "build/macos/output/MCA_Selector_Setup.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: macOS-Artifact
          path: build/macos/output/MCA_Selector_Setup.dmg

      - name: Upload assets
        uses: AButler/upload-release-assets@v3.0
        with:
          files: build/macos/output/MCA_Selector_Setup.dmg
          repo-token: ${{ secrets.GITHUB_TOKEN }}
